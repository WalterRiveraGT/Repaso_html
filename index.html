<!DOCTYPE html>
<!--la etiequeta doctype html, sirve
para facilitar al servidor que identifique que tipo de 
documento es  -->
<html lang="es">
<!--encierra todo el contenido de la página html-->

<head>
    <!--contiene los metadatos de la pagina, los scripts, título, entre otros--->
    <meta charset="utf-8" />
    <!--añade información acerca de la página 
    sobre aquellas coincidencias
    que el usuario que consulta la página pretende encontrar
    y del tipo de lenguaje en el que está hecha; asimismo el nombre
    del autor-->
    <meta name="author" content="Walter Rivera">
    <meta name="description" content="Sitio inicial de prueba">
    <meta name="keywords" content="prueba, html, desarrollo web">
    <!--colocar palabras 
    claves para el posicionamiento en los buscadores-->
    <title>Inicio</title>
    <link rel="icon" href="./img/brave.jpg" />
    <!--la etiqueta link sirve
    para vincular contenido-->
    <link rel="stylesheet" type="text/css" href="main.css" />
    <script src="main.js"></script>
</head>

<body>
    <header>
        <!--encabezado incial del sitio-->
        <h1 align="center">BIENVENIDO</h1>
    </header>
    <nav>
        barra de navegación
        <!--barra de navegación-->
    </nav>

    <section>
        sección principal
        <!--Etiqueta para escribir una sección-->
    </section>
    <aside>
        columna
        <!--etiqueta para identificar columnas-->
    </aside>

    <article>
        <b>articulo en negrita</b>
        <br> salto de línea
        <!--etiqueta para escribir artículos-->
    </article>
    <hr>
    <a href="https://www.google.com.gt"> </a>

</body>

</html>
